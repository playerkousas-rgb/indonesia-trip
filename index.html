<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>童遊世界‧印尼活動備忘</title>
  <meta name="theme-color" content="#0f766e" />
  <style>
    :root{--bg:#f4f7fb;--card:#fff;--text:#0f172a;--muted:#64748b;--line:#dbe3ee;--primary:#0f766e;--primary2:#0ea5a4;--primary-soft:#ccfbf1;--blue-soft:#dbeafe;--red-soft:#fee2e2;--yellow-soft:#fef3c7;--shadow:0 12px 30px rgba(15,23,42,.08);--radius:20px}
    *{box-sizing:border-box} html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;background:linear-gradient(180deg,#ecfeff 0%,#f8fafc 24%,var(--bg) 100%);color:var(--text)}
    .page{max-width:980px;margin:0 auto;padding:16px 16px 60px}.hero{background:linear-gradient(135deg,#0f766e 0%,#0ea5a4 60%,#38bdf8 100%);color:#fff;border-radius:28px;padding:22px 20px;box-shadow:0 18px 40px rgba(15,118,110,.22)} .top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.tag{display:inline-block;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.2);padding:8px 12px;border-radius:999px;font-size:13px;font-weight:700} h1{margin:14px 0 8px;font-size:29px;line-height:1.2}.hero p{margin:0;color:rgba(255,255,255,.92);line-height:1.6;font-size:15px}.hero-grid{margin-top:16px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.hero-pill{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.2);border-radius:16px;padding:12px}.hero-pill .label{font-size:12px;color:rgba(255,255,255,.75)}.hero-pill .value{margin-top:4px;font-weight:700}.toolbar{margin-top:16px;display:flex;flex-wrap:wrap;gap:10px}.btn,button{border:0;border-radius:12px;padding:11px 14px;font-weight:700;cursor:pointer;font-size:14px}.btn-primary{background:var(--primary);color:#fff}.btn-light{background:#fff;color:var(--text);border:1px solid var(--line)}.btn-soft{background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.22)} .section{margin-top:24px}.section-head{display:flex;justify-content:space-between;align-items:end;gap:12px;margin-bottom:12px}.section-head h2{margin:0;font-size:20px}.section-head p{margin:0;color:var(--muted);font-size:13px}.cards{display:grid;grid-template-columns:1fr;gap:14px}.card,.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}.card-top{display:flex;justify-content:space-between;gap:12px;margin-bottom:12px}.icon{width:46px;height:46px;border-radius:14px;display:grid;place-items:center;font-size:22px;background:#f8fafc;border:1px solid var(--line)}.badge{font-size:12px;font-weight:700;border-radius:999px;padding:7px 10px;background:var(--primary-soft);color:var(--primary)}.card h3{margin:0 0 8px;font-size:18px}.card p{margin:0;color:var(--muted);line-height:1.6;font-size:14px}.card-footer{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:14px}.small{font-size:12px;color:var(--muted)}.hidden{display:none!important}.list{display:grid;gap:10px}.list-item{border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff}.meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}.chip{font-size:12px;padding:6px 10px;border-radius:999px;background:#f8fafc;border:1px solid var(--line)}.color-blue{background:var(--blue-soft)}.color-red{background:var(--red-soft)}.color-yellow{background:var(--yellow-soft)} .progress{margin:12px 0 0;height:10px;background:#e2e8f0;border-radius:999px;overflow:hidden}.progress>div{height:100%;background:linear-gradient(90deg,var(--primary),var(--primary2));width:0%}.checklist{display:grid;gap:10px}.check-item{display:flex;gap:12px;align-items:flex-start;border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff}.check-item input{margin-top:4px;transform:scale(1.2)}.table{width:100%;border-collapse:collapse;font-size:14px}.table th,.table td{border-bottom:1px solid var(--line);text-align:left;padding:10px 8px;vertical-align:top}.modal{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;padding:16px}.modal.open{display:flex}.modal-card{width:min(460px,100%);background:#fff;border-radius:20px;padding:18px;box-shadow:0 30px 60px rgba(15,23,42,.2)}.input,select{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--line);font-size:14px;background:#fff}.nav-tabs{display:flex;gap:8px;overflow:auto;padding-bottom:4px}.link{color:#2563eb;text-decoration:none;font-weight:700}#statusBar{margin-top:10px;font-size:13px;color:#e2e8f0}@media (min-width:720px){.cards{grid-template-columns:repeat(2,minmax(0,1fr))}.page{padding:22px 18px 60px}}
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="top">
        <div>
          <div class="tag" id="siteTag">🌏 童遊世界‧印尼活動備忘</div>
          <h1 id="siteTitle">童遊世界‧印尼活動備忘</h1>
          <p id="siteDesc">載入中...</p>
          <div id="statusBar"></div>
        </div>
        <button class="btn btn-soft" id="showLoginBtn">登入</button>
      </div>
      <div class="hero-grid">
        <div class="hero-pill"><div class="label">日期</div><div class="value" id="dateValue">7 月 11–20 日</div></div>
        <div class="hero-pill"><div class="label">地點</div><div class="value">印尼 Indonesia</div></div>
        <div class="hero-pill"><div class="label">模式</div><div class="value">公開 + 登入分權限</div></div>
        <div class="hero-pill"><div class="label">資料來源</div><div class="value">Google Sheet + Apps Script</div></div>
      </div>
      <div id="heroSummary" style="margin-top:14px"></div>
      <div class="toolbar">
        <button class="btn btn-light hidden" id="myProfileBtn">我的資料</button>
        <button class="btn btn-light hidden" id="leaderBtn">領袖資料</button>
        <button class="btn btn-light hidden" id="adminBtn">管理員版面</button>
        <button class="btn btn-light hidden" id="logoutBtn">登出</button>
      </div>
    </section>

    <section class="section">
      <div class="section-head"><div><h2>資訊卡片入口</h2><p>卡片由 Google Sheet 控制開關、排序及權限。</p></div></div>
      <div class="cards" id="cards"></div>
    </section>

    <section class="section hidden" id="contentSection">
      <div class="section-head"><div><h2 id="contentTitle">內容</h2><p>按卡片查看資料</p></div></div>
      <div class="panel" id="contentPanel"></div>
    </section>

    <section class="section hidden" id="adminSection">
      <div class="section-head"><div><h2>管理員版面</h2><p>超管可直接在前端管理 Sheet 權限與卡片設定。</p></div></div>
      <div class="panel">
        <div class="nav-tabs">
          <button class="btn btn-light" data-admin-tab="users">使用者管理</button>
          <button class="btn btn-light" data-admin-tab="cards">卡片管理</button>
          <button class="btn btn-light" data-admin-tab="permissions">個別權限</button>
          <button class="btn btn-light" data-admin-tab="sheets">工作表標示</button>
        </div>
        <div style="margin-top:16px" id="adminTabContent"></div>
      </div>
    </section>
  </main>

  <div class="modal" id="loginModal">
    <div class="modal-card">
      <h3 style="margin-top:0">登入帳號</h3>
      <div class="list">
        <input class="input" id="usernameInput" placeholder="帳號 / Email" />
        <input class="input" id="passwordInput" placeholder="密碼" type="password" />
        <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:8px;">
          <button class="btn btn-light" id="closeLoginBtn">取消</button>
          <button class="btn btn-primary" id="submitLoginBtn">登入</button>
        </div>
      </div>
    </div>
  </div>
  <script src="./app.js"></script>
</body>
</html>
